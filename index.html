<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#090b10">
  <title>مراجعة البرمجة</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">C++</span>
      <div>
        <strong>مراجعة البرمجة</strong>
        <span id="headerSubtitle">اختر قسمًا للبدء</span>
      </div>
    </div>
    <button class="icon-button is-hidden" id="homeButton" type="button" aria-label="الأقسام" title="الأقسام">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
    </button>
  </header>

  <main>
    <section id="homeView" class="view">
      <div class="intro">
        <h1>دورات مبادئ برمجة (إدارة أعمال)</h1>
      </div>
      <nav id="categoryList" class="category-list" aria-label="أقسام الأسئلة"></nav>
      <footer class="site-credit">
        <span>تم الإعداد بواسطة م. محمد المعراوي</span>
        <a href="https://t.me/Mohammedmarawi" target="_blank" rel="noopener noreferrer" aria-label="حساب محمد المعراوي على تلغرام">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 3 3.7 9.7c-1.2.5-1.2 1.2-.2 1.5l4.4 1.4 1.7 5.2c.2.7.1 1 .9 1 .6 0 .9-.3 1.2-.6l2.2-2.1 4.6 3.4c.9.5 1.5.2 1.7-.8L23 4.4C23.3 3.1 22.5 2.5 21 3Z"/><path d="m8 12.5 10.5-6.6"/></svg>
          <span>@Mohammedmarawi</span>
        </a>
      </footer>
    </section>

    <section id="sectionView" class="view is-hidden">
      <div class="section-tools">
        <div class="section-heading">
          <p class="eyebrow" id="sectionKicker"></p>
          <h1 id="sectionTitle"></h1>
          <p id="sectionMeta"></p>
        </div>
      </div>
      <div id="questionList" class="question-list"></div>
    </section>
  </main>

  <button id="scrollTopButton" class="scroll-top is-hidden" type="button" aria-label="العودة إلى الأعلى" title="العودة إلى الأعلى">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18 15-6-6-6 6"/></svg>
  </button>

  <script src="questions-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
